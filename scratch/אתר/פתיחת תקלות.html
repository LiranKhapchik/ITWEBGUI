<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פתיחת קריאת שירות - צוות מחשוב</title>
    <link rel="stylesheet" href="fonts.css">
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3776AB',
                        primaryHover: '#2b5d87',
                        secondary: '#4cb5f5'
                    }
                }
            }
        }
    </script>
    <script>
        const SVG_ICONS = {
            'moon': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>`,
            'sun': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>`,
            'user': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>`,
            'arrow-back': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>`,
            'check': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>`,
            'phone': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>`,
            'map-pin': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0L6.343 16.657a8 8 0 1111.314 0z"/><circle cx="12" cy="11" r="3" stroke-width="2"/>`,
            'alert-triangle': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>`,
            'info': `<circle cx="12" cy="12" r="10" stroke-width="2"/><line x1="12" y1="16" x2="12" y2="12" stroke-width="2"/><line x1="12" y1="8" x2="12.01" y2="8" stroke-width="2.5"/>`
        };

        class UiIcon extends HTMLElement {
            static get observedAttributes() { return ['name', 'class', 'viewbox']; }
            attributeChangedCallback() { this.render(); }
            connectedCallback() { this.render(); }
            render() {
                const name = this.getAttribute('name');
                const cls = this.getAttribute('class') || '';
                const vb = this.getAttribute('viewbox') || '0 0 24 24';
                const rawSvg = SVG_ICONS[name];
                if (rawSvg) {
                    this.innerHTML = `<svg class="${cls}" fill="none" viewBox="${vb}" stroke="currentColor">${rawSvg}</svg>`;
                }
            }
        }
        if (!customElements.get('ui-icon')) {
            customElements.define('ui-icon', UiIcon);
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('mch_theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        function updateThemeIcon(isDark) {
            const icons = document.querySelectorAll('button[onclick="toggleDarkMode()"] ui-icon');
            icons.forEach(icon => {
                icon.setAttribute('name', isDark ? 'sun' : 'moon');
                const cls = icon.getAttribute('class') || '';
                const vb = icon.getAttribute('viewbox') || '0 0 24 24';
                const rawSvg = SVG_ICONS[isDark ? 'sun' : 'moon'];
                if (rawSvg) {
                    icon.innerHTML = `<svg class="${cls}" fill="none" viewBox="${vb}" stroke="currentColor">${rawSvg}</svg>`;
                }
            });
        }

        // Auto-load theme
        if (localStorage.getItem('mch_theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.addEventListener('DOMContentLoaded', () => updateThemeIcon(true));
        }
    </script>
    <style>
        body {
            font-family: 'Assistant', 'Segoe UI', Tahoma, sans-serif;
            letter-spacing: -0.01em;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .tile-active {
            border-color: #3776AB;
            background-color: rgba(55, 118, 171, 0.08);
            box-shadow: 0 0 0 2px rgba(55, 118, 171, 0.2);
        }
        .dark .tile-active {
            border-color: #38bdf8;
            background-color: rgba(56, 189, 248, 0.08);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        .spinner {
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-200">

    <!-- Header -->
    <header class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-4 flex justify-between items-center border-b border-slate-200/60 dark:border-slate-800/80">
        <div class="flex items-center gap-4">
            <a href="אתר מחשוב.html" class="px-4 py-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 font-extrabold text-sm hover:bg-slate-50 dark:hover:bg-slate-800/60 transition-all flex items-center gap-2 shadow-sm" title="חזרה לאתר מחשוב">
                <ui-icon name="arrow-back" class="w-4 h-4"></ui-icon>
                <span>חזרה לאתר מחשוב</span>
            </a>
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">פתיחת קריאת שירות</h1>
                <p class="text-[#3776AB] dark:text-[#38bdf8] font-bold text-xs sm:text-sm mt-0.5">צוות מחשוב ואינטגרציה</p>
            </div>
        </div>
        <div>
            <button onclick="toggleDarkMode()" class="flex items-center justify-center p-2.5 rounded-xl bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 transition-all border border-slate-200 dark:border-slate-800 shadow-sm" title="שינוי ערכת נושא">
                <ui-icon name="moon" class="w-5 h-5"></ui-icon>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Form and Summary Wrapper -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start" id="main-grid-layout">
            
            <!-- Left & Center: Form Fields -->
            <div class="lg:col-span-2 space-y-8">
                
                <!-- Card 1: פרטי פותח הקריאה -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800/80 rounded-3xl p-6 shadow-sm">
                    <h2 class="text-lg font-extrabold text-slate-900 dark:text-white mb-5 flex items-center gap-2">
                        <ui-icon name="user" class="w-5 h-5 text-[#3776AB] dark:text-[#38bdf8]"></ui-icon>
                        פרטי פותח הקריאה
                    </h2>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-5">
                        <!-- מספר אישי -->
                        <div>
                            <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-2">מספר אישי <span class="text-red-500">*</span></label>
                            <input type="text" id="auth-id" placeholder="הזן מס' אישי" class="w-full font-mono font-bold bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" maxlength="9" oninput="checkUser(); handleFormChange();">
                        </div>
                        <!-- שם מלא -->
                        <div>
                            <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-2">שם מלא <span class="text-red-500">*</span></label>
                            <input type="text" id="auth-name" placeholder="שם מלא" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" oninput="handleFormChange();">
                        </div>
                        <!-- דרגה -->
                        <div>
                            <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-2">דרגה <span class="text-red-500">*</span></label>
                            <select id="auth-rank" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-3 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all cursor-pointer" onchange="handleFormChange();">
                                <option value="">-- בחר --</option>
                                <option value="טוראי">טוראי</option>
                                <option value="רב״ט">רב״ט</option>
                                <option value="סמל">סמל</option>
                                <option value="סמ״ר">סמ״ר</option>
                                <option value="רס״ל">רס״ל</option>
                                <option value="רס״ר">רס״ר</option>
                                <option value="רס״מ">רס״מ</option>
                                <option value="רס״ב">רס״ב</option>
                                <option value="רנ״ג">רנ״ג</option>
                                <option value="סג״ם">סג״ם</option>
                                <option value="סגן">סגן</option>
                                <option value="סרן">סרן</option>
                                <option value="רס״ן">רס״ן</option>
                                <option value="סא״ל">סא״ל</option>
                                <option value="אל״מ">אל״מ</option>
                                <option value="אע״צ">אע״צ</option>
                            </select>
                        </div>
                        <!-- תפקיד -->
                        <div>
                            <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-2">תפקיד</label>
                            <input list="roles-list" type="text" id="auth-role" placeholder="הקלד או בחר תפקיד" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" oninput="handleFormChange();">
                            <datalist id="roles-list">
                                <option value="מנהל/ת רשת">
                                <option value="טכנאי/ת">
                                <option value="קצין/ת מחשוב">
                                <option value="רמ״ד">
                                <option value="ראש צוות">
                                <option value="משתמש קצה">
                            </datalist>
                        </div>
                    </div>
                </div>

                <!-- Card 2: מיקום ועמדה -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800/80 rounded-3xl p-6 shadow-sm">
                    <h2 class="text-lg font-extrabold text-slate-900 dark:text-white mb-5 flex items-center gap-2">
                        <ui-icon name="map-pin" class="w-5 h-5 text-[#3776AB] dark:text-[#38bdf8]"></ui-icon>
                        מיקום העמדה וסוגה
                    </h2>

                    <!-- מיקום: בניין וחדר -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-6">
                        <div>
                            <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-2">בניין <span class="text-red-500">*</span></label>
                            <select id="sel-building" onchange="onBuildingChange();" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-3 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all cursor-pointer">
                                <option value="">-- בחר בניין --</option>
                                <option value="snunit">סנונית</option>
                                <option value="lavie">לביא</option>
                                <option value="ofroni">עפרוני</option>
                                <option value="medutz">מדו"צ</option>
                                <option value="yerpa">ירפ"א</option>
                                <option value="bcha21">בחא 21</option>
                            </select>
                        </div>
                        <div id="room-select-wrapper" class="hidden">
                            <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-2">חדר <span class="text-red-500">*</span></label>
                            <select id="sel-room" onchange="onRoomChange();" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-3 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all cursor-pointer">
                                <option value="">-- בחר חדר --</option>
                            </select>
                        </div>
                    </div>

                    <!-- סוג עמדה (אריחים) -->
                    <div id="station-type-section" class="hidden border-t border-slate-100 dark:border-slate-800 pt-6 mb-6">
                        <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-3">סוג העמדה <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="station-type-tiles">
                            <!-- עמדה משרדית -->
                            <div class="border border-slate-200 dark:border-slate-800 rounded-2xl p-5 text-center bg-white dark:bg-slate-900 cursor-pointer transition-all hover:shadow-md hover:border-[#3776AB] flex flex-col items-center justify-center gap-3" onclick="selectStationType('office', this)" id="tile-office">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400 dark:text-slate-500 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="12" rx="2" ry="2"></rect>
                                    <line x1="12" y1="20" x2="12" y2="16"></line>
                                    <line x1="8" y1="20" x2="16" y2="20"></line>
                                </svg>
                                <span class="text-sm font-extrabold text-slate-700 dark:text-slate-300" id="lbl-office-tile">עמדה משרדית</span>
                            </div>
                            <!-- עמדת בחינה -->
                            <div class="border border-slate-200 dark:border-slate-800 rounded-2xl p-5 text-center bg-white dark:bg-slate-900 cursor-pointer transition-all hover:shadow-md hover:border-[#3776AB] flex flex-col items-center justify-center gap-3" onclick="selectStationType('exam', this)" id="tile-exam">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400 dark:text-slate-500 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                                    <path d="M6 12v5c0 2 2.5 3 6 3s6-1 6-3v-5"></path>
                                </svg>
                                <span class="text-sm font-extrabold text-slate-700 dark:text-slate-300">עמדת בחינה</span>
                            </div>
                        </div>
                    </div>

                    <!-- מספר עמדה (גריד) -->
                    <div id="station-number-section" class="hidden border-t border-slate-100 dark:border-slate-800 pt-6">
                        <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-3">מספר עמדה <span class="text-red-500">*</span></label>
                        <div id="station-buttons-grid" class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2">
                            <!-- כפתורים דינמיים -->
                        </div>
                    </div>
                </div>

                <!-- Card 3: פרטי התקלה -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800/80 rounded-3xl p-6 shadow-sm">
                    <h2 class="text-lg font-extrabold text-slate-900 dark:text-white mb-5 flex items-center gap-2">
                        <ui-icon name="info" class="w-5 h-5 text-[#3776AB] dark:text-[#38bdf8]"></ui-icon>
                        פרטי התקלה
                    </h2>

                    <!-- סוג תקלה -->
                    <div class="mb-6">
                        <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-3">סוג התקלה <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-3 gap-4" id="fault-type-tiles">
                            <!-- חומרה -->
                            <div class="border border-slate-200 dark:border-slate-800 rounded-2xl p-4 text-center bg-white dark:bg-slate-900 cursor-pointer transition-all hover:shadow-md hover:border-[#3776AB] flex flex-col items-center justify-center gap-2" onclick="selectFaultType('hardware', this)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400 dark:text-slate-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                                </svg>
                                <span class="text-xs sm:text-sm font-extrabold text-slate-700 dark:text-slate-300">חומרה</span>
                            </div>
                            <!-- תוכנה -->
                            <div class="border border-slate-200 dark:border-slate-800 rounded-2xl p-4 text-center bg-white dark:bg-slate-900 cursor-pointer transition-all hover:shadow-md hover:border-[#3776AB] flex flex-col items-center justify-center gap-2" onclick="selectFaultType('software', this)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400 dark:text-slate-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                                </svg>
                                <span class="text-xs sm:text-sm font-extrabold text-slate-700 dark:text-slate-300">תוכנה</span>
                            </div>
                            <!-- טלפוניה ורשת -->
                            <div class="border border-slate-200 dark:border-slate-800 rounded-2xl p-4 text-center bg-white dark:bg-slate-900 cursor-pointer transition-all hover:shadow-md hover:border-[#3776AB] flex flex-col items-center justify-center gap-2" onclick="selectFaultType('network', this)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400 dark:text-slate-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                </svg>
                                <span class="text-xs sm:text-sm font-extrabold text-slate-700 dark:text-slate-300">טלפוניה ורשת</span>
                            </div>
                        </div>
                    </div>

                    <!-- רכיבי חומרה (מוצג רק בחומרה) -->
                    <div id="hardware-components-section" class="hidden border-t border-slate-100 dark:border-slate-800 pt-6 mb-6">
                        <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-3">רכיבים תקולים <span class="text-slate-400 dark:text-slate-500 font-normal">(סמן את הרכיבים שלא עובדים)</span></label>
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="hardware-checkboxes-grid">
                            <!-- תיבות סימון דינמיות -->
                        </div>
                        
                        <!-- פירוט תקלות נפוצות (Pills) -->
                        <div id="sub-faults-wrapper" class="mt-5 space-y-4">
                            <!-- קטגוריות וכדורי בחירה ייכתבו כאן -->
                        </div>
                    </div>

                    <!-- פרטי מתמיין (חומרה + עמדת בחינה) -->
                    <div id="candidate-details-section" class="hidden border-t border-slate-100 dark:border-slate-800 pt-6 mb-6 bg-slate-50/50 dark:bg-slate-950/40 p-4 rounded-2xl border border-slate-100 dark:border-slate-800/60">
                        <h3 class="text-xs font-extrabold text-[#3776AB] dark:text-[#38bdf8] uppercase mb-4 tracking-wider">פרטי מתמיין/ת</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-[11px] font-extrabold text-slate-500 dark:text-slate-400 mb-1.5">שם מלא</label>
                                <input type="text" id="exam-name" placeholder="שם המתמיין" class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-all" oninput="handleFormChange();">
                            </div>
                            <div>

                            <input type="text" id="inp-phone" maxlength="8" placeholder="518-0000" oninput="fmtPhone(this); handleFormChange();" class="w-full font-mono text-left bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" dir="ltr">

                        <textarea id="fault-desc" rows="4" placeholder="תאר/י את הבעיה בפירוט..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all resize-y" oninput="handleFormChange();"></textarea>

                <!-- Card 4: סוג רשת (מוצג רק למשרדית) -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800/80 rounded-3xl p-6 shadow-sm hidden" id="network-card">
                    <h2 class="text-lg font-extrabold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                        <ui-icon name="phone" class="w-5 h-5 text-[#3776AB] dark:text-[#38bdf8]"></ui-icon>
                        רשת תקשורת

                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 mb-3">סוג הרשת <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="network-tiles">
                            <!-- שביל החלב -->
                            <div class="border border-slate-200 dark:border-slate-800 rounded-xl py-3 text-center text-sm font-bold text-slate-600 dark:text-slate-400 bg-slate-50 dark:bg-slate-950 cursor-pointer transition-all hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center" onclick="selectNetwork('shvil', this)" id="net-shvil">שביל החלב</div>
                            <!-- קליק-נט -->

                            <!-- דב"ש -->
                            <div class="border border-slate-200 dark:border-slate-800 rounded-xl py-3 text-center text-sm font-bold text-slate-600 dark:text-slate-400 bg-slate-50 dark:bg-slate-950 cursor-pointer transition-all hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center" onclick="selectNetwork('dvash', this)" id="net-dvash">דב"ש</div>

            <!-- Right Column: Summary Panel -->

                    <h2 class="text-lg font-extrabold text-slate-900 dark:text-white mb-4">סיכום הבקשה</h2>
                    
                    <!-- Live Summary Area -->

        <!-- Success Screen -->
        <div class="hidden max-w-2xl mx-auto py-16 px-6 text-center bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800/80 rounded-[2.5rem] shadow-xl shadow-slate-100/50 dark:shadow-none" id="success-screen">
            <div class="w-24 h-24 bg-emerald-50 dark:bg-emerald-950/30 border-4 border-white dark:border-slate-800 shadow-md rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-emerald-500 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="אתר מחשוב.html" class="w-full sm:w-auto bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl px-8 py-3.5 font-bold transition-all text-center">
                    חזרה למרכז השליטה
                </a>
                <button class="w-full sm:w-auto bg-slate-900 hover:bg-slate-850 dark:bg-slate-200 dark:hover:bg-white text-white dark:text-slate-950 rounded-xl px-8 py-3.5 font-extrabold shadow-md transition-all" onclick="resetAll()">
                    פתיחת קריאה נוספת
                </button>
            </div>
        </div>

    </main>

    <!-- JS Logic -->
    <script>
        const BUILDING_LABELS = {
            snunit: 'סנונית',
            lavie: 'לביא',
            ofroni: 'עפרוני',
            medutz: 'מדו"צ',
            yerpa: 'ירפ"א',
            bcha21: 'בחא 21'
        };

        const BUILDING_ROOMS = {
            snunit: ['רימון', 'חדר מאבחנות', 'פסיכולוגים 1', 'פסיכולוגים 2', 'פסיכולוגים 3', 'פסיכולוגים 4', 'משרד ס. מ"ג', 'משרד מאיה'],
            lavie: null,
            ofroni: ['כיתה ימנית', 'כיתה שמאלית', 'חדר תעונ"ה'],
            medutz: null,
            yerpa: ['משרד מ"ג', 'משרד מ"ג ענף', 'משרד דנה'],
            bcha21: ['מרכז הערכה', 'כיתת שביל']
        };

        function getStationConfig(building, room) {
            if (building === 'snunit') {
                if (room === 'רימון') return { countExam: 30, countOffice: 1, allowOffice: true, allowExam: true };
                if (room === 'חדר מאבחנות') return { countExam: 0, countOffice: 8, allowOffice: true, allowExam: false };
                // ברירת מחדל לשאר חדרים בסנונית
                return { countExam: 0, countOffice: 1, allowOffice: true, allowExam: false };
            }
            if (building === 'lavie') {
                return { countExam: 40, countOffice: 1, allowOffice: true, allowExam: true };
            }
            if (building === 'ofroni') {
                if (['כיתה ימנית', 'כיתה שמאלית'].includes(room)) return { countExam: 20, countOffice: 1, allowOffice: true, allowExam: true };
                if (room === 'חדר תעונ"ה') return { countExam: 0, countOffice: 8, allowOffice: true, allowExam: false };
                return { countExam: 0, countOffice: 1, allowOffice: true, allowExam: false };
            }
            if (building === 'medutz') {
                return { countExam: 0, countOffice: 8, allowOffice: true, allowExam: false };
            }
            if (building === 'bcha21') {
                return { countExam: 20, countOffice: 1, allowOffice: true, allowExam: true };
            }
            // ברירת מחדל מגינה
            return { countExam: 0, countOffice: 1, allowOffice: true, allowExam: false };
        }

        const HW_OFFICE = ['עכבר', 'מקלדת', 'מצלמה', 'מסך', 'מדפסת'];
        const HW_EXAM = ['עכבר', 'מקלדת', 'מסך', 'אוזניות', 'סטיק', 'מצערת', 'לוח מקשים כסוף'];

        const COMMON_FAULTS = {
            'מסך': ['מרצד', 'לא נדלק', 'אין תצוגה (No Signal)', 'פסים על המסך', 'נזק פיזי'],
            'עכבר': ['לא מגיב', 'גלילה קופצת', 'קליק שמאלי/ימני תקול', 'כבל קרוע'],
            'מקלדת': ['מקשים לא מגיבים', 'מקש תקוע/לחוץ', 'נתק במגעים (מתנתק ומתחבר)'],
            'מצלמה': ['תמונה שחורה', 'לא מזוהה במחשב', 'תמונה מטושטשת/קופאת'],
            'מדפסת': ['נתקע נייר', 'מדפיס מטושטש', 'נורית שגיאה דולקת', 'לא מושכת נייר'],
            'אוזניות': ['שומעים בצד אחד בלבד', 'מיקרופון לא עובד', 'רעש סטטי', 'כבל קרוע'],
            'סטיק': ['לא מגיב לתנועה', 'כפתורים לא עובדים', 'לא מתמרכז', 'ציר (Z) לא תקין'],
            'מצערת': ['תנועה נוקשה מדי', 'לא מגיבה', 'קפיצות בערכים'],
            'לוח מקשים כסוף': ['לחצנים לא מגיבים', 'נוריות לא דולקות', 'לא מזוהה']
        };

        // State Manager
        let S = {
            id: '',
            name: '',
            rank: '',
            role: '',
            building: '',
            room: '',
            stationType: '',
            station: '',
            faultType: '',
            hwComps: [],
            subFaults: {},
            phone: '',
            examName: '',
            examId: '',
            examType: '',
            desc: '',
            networkType: '',
            stationConfig: null
        };

        // User Lookup
        function checkUser() {
            const idInput = document.getElementById('auth-id');
            if (!idInput) return;
            const idVal = idInput.value.trim();
            if (!idVal) return;
            
            S.id = idVal;
            const saved = localStorage.getItem('user_' + idVal);
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    document.getElementById('auth-name').value = user.name || '';
                    document.getElementById('auth-rank').value = user.rank || '';
                    document.getElementById('auth-role').value = user.role || '';
                    
                    S.name = user.name || '';
                    S.rank = user.rank || '';
                    S.role = user.role || '';
                } catch (e) {
                    console.error("Error reading saved user data", e);
                }
            }
        }

        function saveUser() {
            if (S.id && S.name && S.rank) {
                localStorage.setItem('user_' + S.id, JSON.stringify({
                    id: S.id,
                    name: S.name,
                    rank: S.rank,
                    role: S.role
                }));
            }
        }

        // Dropdown Handlers
        function onBuildingChange() {
            const bSelect = document.getElementById('sel-building');
            const roomWrapper = document.getElementById('room-select-wrapper');
            const roomSelect = document.getElementById('sel-room');
            
            S.building = bSelect.value;
            S.room = '';
            S.stationType = '';
            S.station = '';
            S.stationConfig = null;

            // Reset components selections
            S.hwComps = [];
            S.subFaults = {};

            const rooms = BUILDING_ROOMS[S.building];
            if (rooms && rooms.length > 0) {
                roomSelect.innerHTML = '<option value="">-- בחר חדר --</option>';
                rooms.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r;
                    opt.textContent = r;
                    roomSelect.appendChild(opt);
                });
                roomWrapper.classList.remove('hidden');
                document.getElementById('station-type-section').classList.add('hidden');
                document.getElementById('station-number-section').classList.add('hidden');
            } else {
                roomWrapper.classList.add('hidden');
                roomSelect.innerHTML = '<option value="">-- בחר חדר --</option>';
                S.stationConfig = getStationConfig(S.building, '');
                initStationTypeChoices();
            }
            handleFormChange();
        }

        function onRoomChange() {
            const roomSelect = document.getElementById('sel-room');
            S.room = roomSelect.value;
            S.stationType = '';
            S.station = '';
            S.hwComps = [];
            S.subFaults = {};

            if (S.room) {
                S.stationConfig = getStationConfig(S.building, S.room);
                initStationTypeChoices();
            } else {
                S.stationConfig = null;
                document.getElementById('station-type-section').classList.add('hidden');
                document.getElementById('station-number-section').classList.add('hidden');
            }
            handleFormChange();
        }

        function initStationTypeChoices() {
            const sec = document.getElementById('station-type-section');
            if (!S.stationConfig) {
                sec.classList.add('hidden');
                return;
            }

            sec.classList.remove('hidden');
            
            const tileOff = document.getElementById('tile-office');
            const tileExam = document.getElementById('tile-exam');
            const lblOff = document.getElementById('lbl-office-tile');

            // Reset styles
            tileOff.classList.remove('tile-active');
            tileExam.classList.remove('tile-active');

            // Toggle visibility
            tileOff.style.display = S.stationConfig.allowOffice ? 'flex' : 'none';
            tileExam.style.display = S.stationConfig.allowExam ? 'flex' : 'none';

            // Custom Label Logic (Classroom diagnostician or standard office)
            if (S.stationConfig.allowOffice && S.stationConfig.allowExam) {
                lblOff.textContent = 'עמדת מאבחנת';
            } else {
                lblOff.textContent = 'עמדה משרדית';
            }

            // Auto-select if only one option is allowed
            if (S.stationConfig.allowOffice && !S.stationConfig.allowExam) {
                selectStationType('office', tileOff);
            } else if (!S.stationConfig.allowOffice && S.stationConfig.allowExam) {
                selectStationType('exam', tileExam);
            } else {
                document.getElementById('station-number-section').classList.add('hidden');
            }
        }

        function selectStationType(type, el) {
            S.stationType = type;
            S.station = '';
            
            // Remove active classes
            document.querySelectorAll('#station-type-tiles > div').forEach(t => t.classList.remove('tile-active'));
            el.classList.add('tile-active');

            // Setup networks card visibility
            const netCard = document.getElementById('network-card');
            if (S.stationType === 'office') {
                netCard.classList.remove('hidden');
                if (S.stationConfig && S.stationConfig.allowExam) {
                    const shvilTile = document.getElementById('net-shvil');
                    selectNetwork('shvil', shvilTile);
                    document.querySelectorAll('#network-tiles > div').forEach(tile => {
                        tile.style.pointerEvents = 'none';
                        if (tile.id !== 'net-shvil') tile.style.opacity = '0.4';
                    });
                } else {
                    handleNetworkLock();
                }
            } else {
                netCard.classList.add('hidden');
                S.networkType = '';
            }

            // Toggle candidate section
            toggleCandidateSection();

            // Populate station numbers
            renderStationNumbers();
            
            // If hardware fault components are active, re-render checkboxes (because they vary by station type)
            if (S.faultType === 'hardware') {
                S.hwComps = [];
                S.subFaults = {};
                renderHardwareCheckboxes();
            }

            handleFormChange();
        }

        function renderStationNumbers() {
            const sec = document.getElementById('station-number-section');
            const grid = document.getElementById('station-buttons-grid');
            if (!S.stationConfig || !S.stationType) {
                sec.classList.add('hidden');
                return;
            }

            const count = S.stationType === 'exam' ? S.stationConfig.countExam : S.stationConfig.countOffice;
            grid.innerHTML = '';

            if (count <= 1) {
                sec.classList.add('hidden');
                S.station = 1;
                return;
            }

            sec.classList.remove('hidden');
            for (let i = 1; i <= count; i++) {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = `py-2 rounded-xl text-sm font-extrabold border transition-all ${
                    S.station == i 
                    ? 'border-[#3776AB] bg-[#3776AB] text-white dark:border-[#38bdf8] dark:bg-[#38bdf8] dark:text-slate-950' 
                    : 'border-slate-200 dark:border-slate-800 hover:border-[#3776AB] dark:hover:border-[#38bdf8] hover:bg-slate-50 dark:hover:bg-slate-800'
                }`;
                b.textContent = i;
                b.onclick = () => {
                    S.station = i;
                    renderStationNumbers();
                    handleFormChange();
                };
                grid.appendChild(b);
            }
        }

        // Fault Type Selection
        function selectFaultType(type, el) {
            S.faultType = type;
            
            // Styles
            document.querySelectorAll('#fault-type-tiles > div').forEach(t => t.classList.remove('tile-active'));
            el.classList.add('tile-active');

            // Hide/Show details
            document.getElementById('hardware-components-section').classList.toggle('hidden', type !== 'hardware');
            document.getElementById('phone-details-section').classList.toggle('hidden', type !== 'network');
            
            toggleCandidateSection();

            if (type === 'hardware') {
                S.hwComps = [];
                S.subFaults = {};
                renderHardwareCheckboxes();
            }

            // Locked network logic: if Network type fault on an Office station, auto-lock to 'shvil'
            handleNetworkLock();

            handleFormChange();
        }

        function handleNetworkLock() {
            if (S.stationType === 'office' && S.faultType === 'network') {
                const shvilTile = document.getElementById('net-shvil');
                selectNetwork('shvil', shvilTile);
                document.querySelectorAll('#network-tiles > div').forEach(tile => {
                    tile.style.pointerEvents = 'none';
                    if (tile.id !== 'net-shvil') tile.style.opacity = '0.4';
                });
            } else {
                document.querySelectorAll('#network-tiles > div').forEach(tile => {
                    tile.style.pointerEvents = 'auto';
                    tile.style.opacity = '1';
                });
            }
        }

        function toggleCandidateSection() {
            const cond = (S.stationType === 'exam' && S.faultType === 'hardware');
            document.getElementById('candidate-details-section').classList.toggle('hidden', !cond);
        }

        // Network Selection
        function selectNetwork(netId, el) {
            S.networkType = netId;
            document.querySelectorAll('#network-tiles > div').forEach(t => {
                t.classList.remove('border-[#3776AB]', 'bg-blue-50/40', 'text-[#3776AB]', 'dark:border-[#38bdf8]', 'dark:bg-sky-950/20', 'dark:text-[#38bdf8]');
                t.classList.add('border-slate-200', 'bg-slate-50', 'text-slate-600', 'dark:border-slate-800', 'dark:bg-slate-950', 'dark:text-slate-400');
            });
            el.classList.remove('border-slate-200', 'bg-slate-50', 'text-slate-600', 'dark:border-slate-800', 'dark:bg-slate-950', 'dark:text-slate-400');
            el.classList.add('border-[#3776AB]', 'bg-blue-50/40', 'text-[#3776AB]', 'dark:border-[#38bdf8]', 'dark:bg-sky-950/20', 'dark:text-[#38bdf8]');
            handleFormChange();
        }

        // Hardware Selection Rendering
        function renderHardwareCheckboxes() {
            const list = S.stationType === 'exam' ? HW_EXAM : HW_OFFICE;
            const grid = document.getElementById('hardware-checkboxes-grid');
            grid.innerHTML = '';

            list.forEach(item => {
                const label = document.createElement('label');
                label.className = `flex items-center gap-3 p-3.5 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-all ${
                    S.hwComps.includes(item) ? 'bg-blue-50/10 dark:bg-blue-950/10 border-[#3776AB] dark:border-[#38bdf8]' : ''
                }`;
                
                const chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.value = item;
                chk.checked = S.hwComps.includes(item);
                chk.className = 'w-4.5 h-4.5 text-[#3776AB] border-slate-300 rounded focus:ring-0 cursor-pointer';
                chk.onchange = (e) => {
                    if (e.target.checked) {
                        S.hwComps.push(item);
                    } else {
                        S.hwComps = S.hwComps.filter(x => x !== item);
                        delete S.subFaults[item];
                    }
                    renderHardwareCheckboxes();
                    renderSubFaultsPanel();
                    handleFormChange();
                };

                const span = document.createElement('span');
                span.className = 'text-sm font-extrabold text-slate-700 dark:text-slate-300';
                span.textContent = item;

                label.appendChild(chk);
                label.appendChild(span);
                grid.appendChild(label);
            });
            renderSubFaultsPanel();
        }

        function toggleSubFault(comp, val) {
            if (S.subFaults[comp] === val) {
                delete S.subFaults[comp];
            } else {
                S.subFaults[comp] = val;
            }
            renderSubFaultsPanel();
            handleFormChange();
        }

        function renderSubFaultsPanel() {
            const wrap = document.getElementById('sub-faults-wrapper');
            wrap.innerHTML = '';

            if (S.hwComps.length === 0) return;

            S.hwComps.forEach(comp => {
                const faults = COMMON_FAULTS[comp];
                if (!faults || faults.length === 0) return;

                const box = document.createElement('div');
                box.className = 'p-4 bg-slate-50 dark:bg-slate-950/60 border border-slate-200/50 dark:border-slate-800 rounded-2xl';

                const title = document.createElement('div');
                title.className = 'text-xs font-extrabold text-[#3776AB] dark:text-[#38bdf8] mb-3';
                title.textContent = `מה התקלה ב${comp}?`;
                box.appendChild(title);

                const pillsDiv = document.createElement('div');
                pillsDiv.className = 'flex flex-wrap gap-2';

                faults.forEach(f => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    const isSel = S.subFaults[comp] === f;
                    
                    btn.className = `px-3.5 py-2 text-xs font-bold rounded-xl transition-all border ${
                        isSel 
                        ? 'bg-[#3776AB] text-white border-[#3776AB] dark:bg-[#38bdf8] dark:text-slate-950 dark:border-[#38bdf8]' 
                        : 'bg-white text-slate-600 border-slate-200 hover:border-slate-300 dark:bg-slate-900 dark:text-slate-300 dark:border-slate-800 dark:hover:border-slate-700'
                    }`;
                    btn.textContent = f;
                    btn.onclick = () => toggleSubFault(comp, f);
                    pillsDiv.appendChild(btn);
                });

                box.appendChild(pillsDiv);
                wrap.appendChild(box);
            });
        }

        // Phone Formatter
        function fmtPhone(el) {
            let v = el.value.replace(/\D/g, '');
            if (v.startsWith('05')) {
                if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3,10);
            } else {
                if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3,7);
            }
            el.value = v;
            S.phone = v;
        }

        // Live Validation list and Summary
        function getValidationErrors() {
            const errs = [];
            
            // Reporter
            const pId = document.getElementById('auth-id').value.trim();
            const pName = document.getElementById('auth-name').value.trim();
            const pRank = document.getElementById('auth-rank').value;
            if (!pId || pId.length < 5) errs.push('reporter-id');
            if (!pName) errs.push('reporter-name');
            if (!pRank) errs.push('reporter-rank');

            // Location
            if (!S.building) errs.push('location-building');
            if (BUILDING_ROOMS[S.building] && !S.room) errs.push('location-room');

            // Station
            if (S.stationConfig) {
                if (!S.stationType) errs.push('station-type');
                if (!S.station) errs.push('station-number');
            }

            // Fault
            if (!S.faultType) errs.push('fault-type');
            if (S.faultType === 'hardware' && S.hwComps.length === 0) errs.push('fault-hardware-comps');
            if (S.faultType === 'network' && !S.phone) errs.push('fault-phone');

            // Network
            if (S.stationType === 'office' && !S.networkType) errs.push('network-type');

            // Description
            const desc = document.getElementById('fault-desc').value.trim();
            if (!desc) errs.push('desc');

            return errs;
        }

        function handleFormChange() {
            // Update global state object values
            S.id = document.getElementById('auth-id').value.trim();
            S.name = document.getElementById('auth-name').value.trim();
            S.rank = document.getElementById('auth-rank').value;
            S.role = document.getElementById('auth-role').value.trim();
            S.desc = document.getElementById('fault-desc').value.trim();
            
            if (S.stationType === 'exam' && S.faultType === 'hardware') {
                S.examName = document.getElementById('exam-name') ? document.getElementById('exam-name').value.trim() : '';
                S.examId = document.getElementById('exam-id') ? document.getElementById('exam-id').value.trim() : '';
                S.examType = document.getElementById('exam-type') ? document.getElementById('exam-type').value : '';
            } else {
                S.examName = '';
                S.examId = '';
                S.examType = '';
            }

            updateLiveSummary();
            updateValidationIndicators();
        }

        function updateLiveSummary() {
            const summ = document.getElementById('live-summary-container');
            if (!summ) return;

            let html = '';

            // User
            if (S.id || S.name) {
                html += `
                <div class="bg-slate-50 dark:bg-slate-950/40 p-4.5 rounded-2xl border border-slate-100 dark:border-slate-800/80">
                    <div class="text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">פותח הקריאה</div>
                    <div class="font-extrabold text-slate-800 dark:text-slate-200 text-sm">
                        ${S.rank || ''} ${S.name || '—'}
                    </div>
                    ${S.id ? `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1 font-semibold font-mono">מ.א. ${S.id} ${S.role ? `• ${S.role}` : ''}</div>` : ''}
                </div>`;
            }

            // Location
            if (S.building) {
                let locStr = BUILDING_LABELS[S.building] || S.building;
                if (S.room) locStr += ` > חדר ${S.room}`;
                if (S.station) {
                    const isDiagnostician = S.stationType === 'office' && S.stationConfig && S.stationConfig.allowExam;
                    const stName = S.stationType === 'exam' ? 'בחינה' : (isDiagnostician ? 'מאבחנת' : 'משרדית');
                    locStr += ` > עמדת ${stName} #${S.station}`;
                }

                html += `
                <div class="bg-slate-50 dark:bg-slate-950/40 p-4.5 rounded-2xl border border-slate-100 dark:border-slate-800/80">
                    <div class="text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">מיקום העמדה</div>
                    <div class="font-extrabold text-slate-800 dark:text-slate-200 text-sm">${locStr}</div>
                </div>`;
            }

            // Fault Details
            if (S.faultType) {
                let typeStr = S.faultType === 'hardware' ? 'חומרה' : (S.faultType === 'software' ? 'תוכנה' : 'טלפוניה ורשת');
                let hwDetail = '';
                if (S.faultType === 'hardware' && S.hwComps.length > 0) {
                    hwDetail = S.hwComps.map(c => S.subFaults[c] ? `${c} (${S.subFaults[c]})` : c).join(', ');
                }

                html += `
                <div class="bg-slate-50 dark:bg-slate-950/40 p-4.5 rounded-2xl border border-slate-100 dark:border-slate-800/80">
                    <div class="text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">סוג תקלה</div>
                    <div class="font-extrabold text-slate-800 dark:text-slate-200 text-sm">${typeStr}</div>
                    ${hwDetail ? `<div class="text-xs text-[#3776AB] dark:text-[#38bdf8] mt-1 font-bold">רכיבים: ${hwDetail}</div>` : ''}
                    ${S.phone ? `<div class="text-xs text-slate-500 mt-1 font-mono font-bold">טלפון צבאי: ${S.phone}</div>` : ''}
                </div>`;
            }

            // Network Type
            if (S.stationType === 'office' && S.networkType) {
                const NET_LABELS = { shvil: 'שביל החלב', clicknet: 'קליק-נט', dvash: 'דב"ש', civilian: 'אזרחית' };
                html += `
                <div class="bg-slate-50 dark:bg-slate-950/40 p-4.5 rounded-2xl border border-slate-100 dark:border-slate-800/80">
                    <div class="text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">רשת חיבור</div>
                    <div class="font-extrabold text-slate-800 dark:text-slate-200 text-sm">${NET_LABELS[S.networkType]}</div>
                </div>`;
            }

            // Fault Description
            if (S.desc) {
                html += `
                <div class="bg-slate-50 dark:bg-slate-950/40 p-4.5 rounded-2xl border border-slate-100 dark:border-slate-800/80">
                    <div class="text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">תיאור התקלה</div>
                    <div class="text-slate-600 dark:text-slate-300 text-sm font-semibold break-words leading-relaxed whitespace-pre-line">${S.desc}</div>
                </div>`;
            }

            if (!html) {
                html = `<p class="text-xs text-slate-400 dark:text-slate-500 text-center py-6 leading-relaxed">הסיכום יתעדכן כאן באופן דינמי בזמן מילוי הפרטים...</p>`;
            }

            summ.innerHTML = html;
        }

        function updateValidationIndicators() {
            const listDiv = document.getElementById('validation-checkmarks-list');
            const submitBtn = document.getElementById('btn-submit');
            const errors = getValidationErrors();

            const checkmarks = [
                { id: 'reporter', label: 'פרטי פותח הקריאה', isOk: !errors.includes('reporter-id') && !errors.includes('reporter-name') && !errors.includes('reporter-rank') },
                { id: 'location', label: 'בחירת מיקום (בניין וחדר)', isOk: !errors.includes('location-building') && !errors.includes('location-room') },
                { id: 'station', label: 'בחירת עמדה ומספרה', isOk: !errors.includes('station-type') && !errors.includes('station-number') },
                { id: 'fault', label: 'סוג ותיאור תקלה תקין', isOk: !errors.includes('fault-type') && !errors.includes('fault-hardware-comps') && !errors.includes('fault-phone') && !errors.includes('desc') }
            ];

            // If office, add network check
            if (S.stationType === 'office') {
                checkmarks.push({
                    id: 'network',
                    label: 'סוג רשת תקשורת',
                    isOk: !errors.includes('network-type')
                });
            }

            let html = '';
            checkmarks.forEach(item => {
                html += `
                <div class="flex items-center gap-2.5 text-xs font-bold ${item.isOk ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-400 dark:text-slate-500'}">
                    <span class="flex-shrink-0 w-4 h-4 rounded-full flex items-center justify-center border ${
                        item.isOk 
                        ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-950/20' 
                        : 'border-slate-300 dark:border-slate-800'
                    }">
                        ${item.isOk ? '✓' : ''}
                    </span>
                    <span>${item.label}</span>
                </div>`;
            });

            listDiv.innerHTML = html;

            // Enable or disable submit
            if (errors.length === 0) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50');
            }
        }

        // Form Submission
        async function submitForm() {
            const errors = getValidationErrors();
            if (errors.length > 0) {
                alert("אנא מלא את כל שדות החובה בטופס.");
                return;
            }

            // Save user details
            saveUser();

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';

            try {
                // 1. Fetch current server state
                let state = { tickets: [], team: [], inventory: [], contacts: [] };
                try {
                    const response = await fetch('api.php?file=mch_state');
                    if (response.ok) {
                        const serverData = await response.json();
                        if (serverData && typeof serverData === 'object') {
                            state = { ...state, ...serverData };
                        }
                    }
                } catch (e) {
                    console.warn("Could not load data from server API, using local storage backup", e);
                    const saved = localStorage.getItem('mch_state');
                    if (saved) {
                        state = JSON.parse(saved);
                    }
                }

                if (!state.tickets) state.tickets = [];

                // Create dates
                const now = new Date();
                const dd = String(now.getDate()).padStart(2, '0');
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const yyyy = now.getFullYear();
                const todayDate = `${dd}/${mm}/${yyyy}`;
                const todayTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

                const tId = 'TCK-' + Math.floor(10000 + Math.random() * 90000);
                
                let title = '';
                if (S.faultType === 'hardware') {
                    title = 'תקלת חומרה - ' + S.hwComps.join(', ');
                } else if (S.faultType === 'software') {
                    title = 'תקלת תוכנה';
                } else {
                    title = 'תקלת רשת';
                }

                const componentStr = S.faultType === 'hardware' 
                    ? S.hwComps.map(c => S.subFaults[c] ? `${c} (${S.subFaults[c]})` : c).join(', ')
                    : (S.faultType === 'software' ? 'תוכנה' : 'רשת');

                // Determine correct station value for dashboard compatibility
                let stationValToSave = S.station || 1;
                const cfg = S.stationConfig;
                if (!cfg) {
                    stationValToSave = 'כללי';
                } else {
                    const examCount = cfg.countExam || 0;
                    const officeCount = cfg.countOffice || 0;
                    const total = Math.max(examCount, officeCount);
                    
                    if (total <= 1) {
                        if (examCount === 1) {
                            stationValToSave = 'מאבחנת';
                        } else {
                            stationValToSave = 'כללי';
                        }
                    } else {
                        if (S.stationType === 'office' && examCount > 0) {
                            stationValToSave = 'מאבחנת';
                        } else {
                            stationValToSave = S.station;
                        }
                    }
                }

                // Construct ticket object
                const newTicket = {
                    id: tId,
                    title: title,
                    building: S.building,
                    room: S.room || '',
                    station: stationValToSave,
                    status: 'open',
                    desc: S.desc,
                    date: `${todayDate} ${todayTime}`,
                    createdAt: `${todayDate}, ${todayTime}`,
                    faultType: S.faultType,
                    component: componentStr,
                    assignedTo: '',
                    phone: S.phone || '',
                    examId: S.examId || '',
                    examName: S.examName || '',
                    examType: S.examType || '',
                    networkType: S.networkType || '',
                    reporterId: S.id,
                    reporterName: `${S.rank} ${S.name}`,
                    reporterRole: S.role || ''
                };

                state.tickets.push(newTicket);

                // 2. Save state to server
                try {
                    await fetch('api.php?file=mch_state', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(state)
                    });
                } catch (e) {
                    console.error("Failed writing state to server API", e);
                }

                // Local backup
                localStorage.setItem('mch_state', JSON.stringify(state));

                // Switch UI to success screen
                document.getElementById('main-grid-layout').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                document.getElementById('ticket-number-display').textContent = 'מספר הקריאה שנפתחה: #' + tId;

            } catch (e) {
                console.error("Submission failed", e);
                alert("אירעה שגיאה בשליחת הטופס. אנא נסה שנית.");
                btn.disabled = false;
                btn.innerHTML = '<ui-icon name="check" class="w-5 h-5"></ui-icon><span>שלח קריאת שירות</span>';
            }
        }

        function resetAll() {
            location.reload();
        }

        // Browser Compatibility Check (Google Chrome only)
        function checkBrowserChrome() {
            const ua = navigator.userAgent;
            const isEdge = /Edg\/|Edge\//i.test(ua);
            const isOpera = /OPR\//i.test(ua);
            const isFirefox = /Firefox\//i.test(ua);
            const isChrome = /Chrome\//i.test(ua) && !isEdge && !isOpera && !isFirefox;

            if (!isChrome) {
                const banner = document.createElement('div');
                banner.id = 'browser-compatibility-banner';
                banner.style.cssText = 'width:100%; background-color:#f59e0b; color:#0f172a; padding:12px 16px; font-weight:800; text-align:center; display:flex; align-items:center; justify-content:center; gap:12px; position:fixed; top:0; left:0; right:0; z-index:99999; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1); border-bottom:3px solid #d97706; direction:rtl;';
                banner.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px; margin:0 auto;">
                        <svg style="width:20px; height:20px; flex-shrink:0;" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                        <span>שים לב: מערכת זו מותאמת בצורה מיטבית לדפדפן Google Chrome בלבד. מומלץ לפתוח אותה ב-Chrome לחוויית שימוש תקינה.</span>
                    </div>
                    <button onclick="document.getElementById('browser-compatibility-banner').style.display='none'" style="position:absolute; left:16px; top:50%; transform:translateY(-50%); background:none; border:none; color:#0f172a; font-size:20px; font-weight:800; cursor:pointer; padding:4px; line-height:1;">✕</button>
                `;
                document.body.insertBefore(banner, document.body.firstChild);
            }
        }

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            checkBrowserChrome();
            handleFormChange();
            
            // Add listeners to input elements to auto-update
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('input', handleFormChange);
                el.addEventListener('change', handleFormChange);
            });
        });
    </script>
</body>
