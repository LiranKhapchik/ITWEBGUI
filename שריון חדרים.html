<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת שיריון חדרים ולוח שנה</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
        <script src="js/config.js"></script>
<script src="js/common.js"></script>
    
    <style>
        html { font-size: 18px; }

        body { 
            font-family: 'Assistant', 'Segoe UI', Tahoma, sans-serif; 
            background-color: #fafbfc; 
            letter-spacing: -0.01em; 
            color: #111827;
        }

        h1, h2, h3, .font-extrabold {
            font-weight: 800 !important;
            letter-spacing: -0.025em;
            text-shadow: 0 0.5px 0 rgba(0,0,0,0.1); 
        }
        
        ::-webkit-scrollbar { width: 0px; }

        select, input[type="text"], input[type="date"], input[type="time"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-family: inherit;
            background-color: #fafbfc;
            color: #111827;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        select:focus, input[type="text"]:focus, input[type="date"]:focus, input[type="time"]:focus {
            outline: none;
            border-color: #3776AB;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(55, 118, 171, 0.15);
        }

        .spinner { 
            width: 1.25rem; height: 1.25rem; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-top-color: #fff; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* סגנונות ייעודיים ללוח השנה */
        .cal-day { transition: all 0.2s ease; cursor: pointer; }
        .cal-day:hover:not(.empty) { background-color: rgba(55, 118, 171, 0.1); }
        .cal-day.selected { background-color: #3776AB !important; color: white !important; font-weight: bold; }
        .cal-day.today { border: 2px solid #3776AB; color: #3776AB; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 lg:p-6 justify-start items-center">

        <header class="w-full max-w-6xl flex justify-between items-center mb-6 px-4">
        <div class="flex items-center gap-4">
            <a href="אתר מחשוב.html" class="px-4 py-2.5 rounded-xl bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 font-extrabold text-sm transition-all flex items-center gap-2 shadow-sm" title="חזרה לאתר מחשוב">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                </svg>
                <span>לאתר מחשוב</span>
            </a>
            <div>
                <h1 class="text-3xl lg:text-4xl font-extrabold tracking-tight text-gray-900">ניהול ושיריון חללי עבודה</h1>
                <p class="text-[#3776AB] font-semibold mt-0.5 text-sm">צוות מחשוב</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="flex items-center justify-center p-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-gray-700 transition-all border border-gray-200" title="מצב חשוך">
                <ui-icon name="moon" class="w-5 h-5"></ui-icon>
            </button>
        </div>
    </header>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
        
        <section class="lg:col-span-5 bg-white rounded-[2rem] shadow-[0_10px_40px_-10px_rgba(0,0,0,0.08)] border border-gray-100 overflow-hidden relative p-6 lg:p-8">
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-[#3776AB] text-white p-2 rounded-xl shadow-md">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </div>
                <h2 class="text-xl font-extrabold text-gray-900">יצירת שריון חדש</h2>
            </div>

            <div id="booking-form">
                <form onsubmit="submitBooking(event)" class="space-y-5">
                    
                    <div>
                        <label class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-wide mb-1.5"><span class="text-red-500">*</span> מבנה</label>
                        <select id="building" required onchange="updateRooms()">
                            <option value="">-- בחר מבנה --</option>
                            <option value="snunit">סנונית</option>
                            <option value="lavie">לביא</option>
                            <option value="ofroni">עפרוני</option>
                            <option value="yerpa">ירפ"א</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-wide mb-1.5"><span class="text-red-500">*</span> חדר / כיתה</label>
                        <select id="room" required disabled>
                            <option value="">-- תחילה בחר מבנה --</option>
                        </select>
                    </div>

                    <hr class="border-t border-dashed border-gray-200">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-wide mb-1.5"><span class="text-red-500">*</span> תאריך</label>
                            <input type="date" id="date" required onchange="onDateChange()">
                        </div>
                        <div class="flex items-end pb-1">
                            <label class="relative flex items-center gap-2.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-xl p-3 w-full cursor-pointer select-none transition-colors">
                                <input type="checkbox" id="all-day" onchange="toggleAllDay(this)" class="w-4 h-4 text-[#3776AB] border-gray-300 rounded focus:ring-[#3776AB]">
                                <span class="text-sm font-bold text-gray-700">שריון יום שלם</span>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="time-inputs-wrap">
                        <div>
                            <label class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-wide mb-1.5"><span class="text-red-500">*</span> שעת התחלה</label>
                            <input type="time" id="start-time" required>
                        </div>
                        <div>
                            <label class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-wide mb-1.5"><span class="text-red-500">*</span> שעת סיום</label>
                            <input type="time" id="end-time" required>
                        </div>
                    </div>

                    <hr class="border-t border-dashed border-gray-200">

                    <div>
                        <label class="block text-[11px] font-extrabold text-gray-500 uppercase tracking-wide mb-1.5"><span class="text-red-500">*</span> שם המזמין / מטרת השיריון</label>
                        <input type="text" id="purpose" placeholder="לדוגמה: פגישת עבודה - פסיכולוגים" required>
                    </div>

                    <div id="error-msg" class="hidden p-3 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm font-bold flex items-center gap-2">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span id="error-text">אנא ודא ששעת הסיום מאוחרת משעת ההתחלה.</span>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl bg-[#3776AB] hover:bg-[#2b5d87] text-white font-extrabold shadow-md shadow-[#3776AB]/20 transition-all flex items-center justify-center gap-2">
                        בצע שיריון חדר
                    </button>
                </form>
            </div>
        </section>

        <section class="lg:col-span-7 bg-white rounded-[2rem] shadow-[0_10px_40px_-10px_rgba(0,0,0,0.08)] border border-gray-100 overflow-hidden p-6 lg:p-8 flex flex-col">
            
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="bg-[#3776AB]/10 text-[#3776AB] p-2 rounded-xl">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </div>
                    <h2 id="calendar-month-year" class="text-xl font-extrabold text-gray-900">מאי 2026</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="changeMonth(-1)" class="p-2 text-gray-600 hover:text-[#3776AB] hover:bg-gray-100 rounded-xl transition-all border border-gray-200">
                        <svg class="w-5 h-5 transform rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 text-gray-600 hover:text-[#3776AB] hover:bg-gray-100 rounded-xl transition-all border border-gray-200">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs text-gray-400 mb-2 uppercase tracking-wider">
                <div>א</div><div>ב</div><div>ג</div><div>ד</div><div>ה</div><div>ו</div><div>ש</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 text-center text-sm font-semibold text-gray-700">
                </div>

            <div class="mt-6 pt-6 border-t border-gray-100 flex-1">
                <h3 id="selected-day-title" class="text-base font-extrabold text-gray-900 mb-4">שריונים ליום נבחר</h3>
                <div id="day-bookings-list" class="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                    </div>
            </div>

        </section>
    </main>

    <script>
        // --- הגדרות השרת (API) ---
        const APP_ID = 'rooms_booking'; // השם של קובץ ה-JSON שישמור את החדרים
        const API_URL = `${CONFIG.API_URL}?file=${APP_ID}`;
        
        let BUILDING_LABELS = { snunit:'סנונית', lavie:'לביא', ofroni:'עפרוני', yerpa:'ירפ"א' };
        let locationsData = {
            snunit: ["רימון", "חדר מאבחנות", "פסיכולוגים 1", "פסיכולוגים 2", "פסיכולוגים 3", "פסיכולוגים 4", "משרד ס. מ\"ג", "משרד מאיה"],
            lavie: ["כיתת לביא"],
            ofroni: ["כיתה ימנית", "כיתה שמאלית", "חדר תעונ\"ה"],
            yerpa: ["משרד מ\"ג", "משרד מ\"ג ענף", "משרד דנה"]
        };
        let roomsConfig = null;

        async function loadRoomsConfig() {
            try {
                const response = await fetch(CONFIG.API_URL + '?file=sync_store&key=rooms_config');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.value) {
                        roomsConfig = JSON.parse(data.value);
                        BUILDING_LABELS = {};
                        locationsData = {};
                        for (const [key, bld] of Object.entries(roomsConfig.buildings)) {
                            BUILDING_LABELS[key] = bld.label;
                        }
                        for (const [key, rms] of Object.entries(roomsConfig.rooms)) {
                            locationsData[key] = (rms || []).map(r => r.name);
                        }
                        rebuildBuildingSelect();
                    }
                }
            } catch (error) {
                console.error('שגיאה בטעינת תצורת חדרים:', error);
            }
        }

        function rebuildBuildingSelect() {
            const bSelect = document.getElementById('building');
            if (!bSelect) return;
            const currentVal = bSelect.value;
            let html = '<option value="">-- בחר מבנה --</option>';
            for (const [key, label] of Object.entries(BUILDING_LABELS)) {
                html += `<option value="${key}">${label}</option>`;
            }
            bSelect.innerHTML = html;
            if (currentVal && bSelect.querySelector(`option[value="${currentVal}"]`)) {
                bSelect.value = currentVal;
            }
        }

        // מערך השריונים הקיים במערכת יתחיל ריק ויתמלא מהשרת
        let bookings = [];

        let currentCalendarDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];

        // --- פונקציות תקשורת מול השרת ---

        async function loadFromServer() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const serverData = await response.json();
                    // בודקים שהמידע שחזר הוא אכן מערך תקין
                    if (Array.isArray(serverData)) {
                        return serverData;
                    }
                }
            } catch (error) {
                console.warn('לא הצליח לטעון נתונים מהשרת. מנסה לטעון מ-localStorage...', error);
            }
            // Fallback ל-localStorage אם אין שרת
            try {
                const localData = localStorage.getItem('mch_rooms_booking');
                if (localData) {
                    const parsed = JSON.parse(localData);
                    if (Array.isArray(parsed)) return parsed;
                }
            } catch (e) {
                console.error("שגיאה בקריאה מ-localStorage:", e);
            }
            return [];
        }

        async function saveToServer(dataObject) {
            // שמירה מקומית כגיבוי מהיר
            try {
                localStorage.setItem('mch_rooms_booking', JSON.stringify(dataObject));
            } catch (e) {
                console.error("שגיאה בשמירה ל-localStorage:", e);
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataObject)
                });
                
                if (!response.ok) throw new Error('שגיאת תקשורת עם השרת');
            } catch (error) {
                console.error('שגיאה בשמירת הנתונים לשרת:', error);
                // לא מציגים התראת alert מציקה אלא רק מזהירים בלוגים כי המערכת שומרת לוקלית
            }
        }

        // --- אתחול המערכת ---
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadRoomsConfig();
            const dateInput = document.getElementById('date');
            const todayStr = new Date().toISOString().split('T')[0];
            dateInput.min = todayStr;
            dateInput.value = todayStr;
            
            // טעינת הנתונים מהשרת לפני שמרנדרים משהו
            bookings = await loadFromServer();
            
            renderCalendar();
            renderDayBookings(selectedDateStr);
        });

        // --- שאר הפונקציות של המערכת ---

        function updateRooms() {
            const buildingSelect = document.getElementById('building');
            const roomSelect = document.getElementById('room');
            const selectedBuilding = buildingSelect.value;

            roomSelect.innerHTML = '<option value="">-- בחר חדר --</option>';

            if (selectedBuilding && locationsData[selectedBuilding]) {
                roomSelect.disabled = false;
                locationsData[selectedBuilding].forEach(room => {
                    const option = document.createElement('option');
                    option.value = room;
                    option.textContent = room;
                    roomSelect.appendChild(option);
                });
            } else {
                roomSelect.disabled = true;
                roomSelect.innerHTML = '<option value="">-- תחילה בחר מבנה --</option>';
            }
        }

        function toggleAllDay(checkbox) {
            const startInput = document.getElementById('start-time');
            const endInput = document.getElementById('end-time');
            const timeWrap = document.getElementById('time-inputs-wrap');

            if (checkbox.checked) {
                startInput.value = "08:00";
                endInput.value = "18:00";
                startInput.disabled = true;
                endInput.disabled = true;
                timeWrap.style.opacity = "0.5";
            } else {
                startInput.value = "";
                endInput.value = "";
                startInput.disabled = false;
                endInput.disabled = false;
                timeWrap.style.opacity = "1";
            }
        }

        function onDateChange() {
            const dateVal = document.getElementById('date').value;
            if(dateVal) {
                selectedDateStr = dateVal;
                const d = new Date(dateVal);
                currentCalendarDate = new Date(d.getFullYear(), d.getMonth(), 1);
                renderCalendar();
                renderDayBookings(selectedDateStr);
            }
        }

        function submitBooking(event) {
            event.preventDefault();
            
            const building = document.getElementById('building').value;
            const room = document.getElementById('room').value;
            const date = document.getElementById('date').value;
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            const purpose = document.getElementById('purpose').value;
            const isAllDay = document.getElementById('all-day').checked;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            if (!isAllDay && startTime >= endTime) {
                errorMsg.classList.remove('hidden');
                document.getElementById('error-text').textContent = 'אנא ודא ששעת הסיום מאוחרת משעת ההתחלה.';
                return;
            }

            const hasConflict = bookings.some(b => 
                b.date === date && 
                b.building === building && 
                b.room === room &&
                ((startTime >= b.startTime && startTime < b.endTime) || (endTime > b.startTime && endTime <= b.endTime) || (startTime <= b.startTime && endTime >= b.endTime))
            );

            if (hasConflict) {
                errorMsg.classList.remove('hidden');
                document.getElementById('error-text').textContent = 'שגיאה: קיים כבר שריון לחדר זה בטווח השעות המבוקש.';
                return;
            }

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div> מבצע שריון...';

            setTimeout(async () => {
                const newId = Date.now(); // שימוש ב-Timestamp כ-ID ייחודי במקום אורך המערך
                bookings.push({ id: newId, date, building, room, startTime, endTime, purpose, isAllDay });
                
                // שמירה לשרת לאחר הוספת השריון
                await saveToServer(bookings);
                
                document.getElementById('purpose').value = '';
                document.getElementById('all-day').checked = false;
                toggleAllDay(document.getElementById('all-day'));
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'בצע שיריון חדר';
                
                selectedDateStr = date;
                renderCalendar();
                renderDayBookings(selectedDateStr);
                
                alert('החדר שוריין בהצלחה והתווסף ללוח השנה!');
            }, 500);
        }

        const MONTH_NAMES = ["ינואר", "פברואר", "מרץ", "אפריל", "מאי", "יוני", "יולי", "אוגוסט", "ספטמבר", "אוקטובר", "נובמבר", "דצמבר"];
        
        function changeMonth(direction) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + direction);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            document.getElementById('calendar-month-year').textContent = `${MONTH_NAMES[month]} ${year}`;
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'cal-day empty h-10';
                grid.appendChild(emptyCell);
            }
            
            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                const currentStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                
                dayCell.className = `cal-day h-10 flex flex-col items-center justify-center rounded-xl font-bold relative bg-gray-50/50 border border-gray-100 text-gray-800`;
                dayCell.textContent = day;
                
                const today = new Date();
                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) { 
                    dayCell.classList.add('today'); 
                }
                if (currentStr === selectedDateStr) { 
                    dayCell.classList.add('selected'); 
                }
                
                const dayBookings = bookings.filter(b => b.date === currentStr);
                if (dayBookings.length > 0 && currentStr !== selectedDateStr) {
                    const dot = document.createElement('span');
                    dot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500 absolute bottom-1';
                    dayCell.appendChild(dot);
                } else if (dayBookings.length > 0 && currentStr === selectedDateStr) {
                    const dot = document.createElement('span');
                    dot.className = 'w-1.5 h-1.5 rounded-full bg-white absolute bottom-1';
                    dayCell.appendChild(dot);
                }
                
                dayCell.onclick = () => {
                    selectedDateStr = currentStr;
                    document.getElementById('date').value = currentStr;
                    renderCalendar();
                    renderDayBookings(currentStr);
                };
                
                grid.appendChild(dayCell);
            }
        }

        function renderDayBookings(dateStr) {
            const listContainer = document.getElementById('day-bookings-list');
            listContainer.innerHTML = '';
            
            const [y, m, d] = dateStr.split('-');
            document.getElementById('selected-day-title').textContent = `שריונים ליום ${parseInt(d)} ב${MONTH_NAMES[parseInt(m)-1]} ${y}`;
            
            const dayBookings = bookings.filter(b => b.date === dateStr);
            
            if (dayBookings.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-6 text-gray-400 font-medium text-sm border-2 border-dashed border-gray-100 rounded-2xl">
                        אין שריונים רשומים ליום זה. החדרים פנויים!
                    </div>`;
                return;
            }
            
            dayBookings.sort((a,b) => a.startTime.localeCompare(b.startTime));
            
            dayBookings.forEach(b => {
                const item = document.createElement('div');
                item.className = `flex flex-col sm:flex-row sm:items-center justify-between p-3 border rounded-xl transition-all ${b.isAllDay ? 'bg-amber-50/40 border-amber-200' : 'bg-gray-50/50 border-gray-100 hover:border-gray-200'}`;
                
                const timeBadge = b.isAllDay 
                    ? `<span class="px-2.5 py-1 rounded-lg bg-amber-100 text-amber-800 text-xs font-black">יום שלם (08:00-18:00)</span>`
                    : `<span class="px-2.5 py-1 rounded-lg bg-blue-50 border border-blue-100 text-[#3776AB] text-xs font-bold font-mono" dir="ltr">${b.startTime} - ${b.endTime}</span>`;
                
                item.innerHTML = `
                    <div class="flex flex-col gap-1">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-extrabold text-gray-900">${BUILDING_LABELS[b.building]} | ${b.room}</span>
                            ${timeBadge}
                        </div>
                        <span class="text-xs font-bold text-gray-500">${b.purpose}</span>
                    </div>
                    <button onclick="deleteBooking(${b.id})" class="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-2 py-1 rounded-lg mt-2 sm:mt-0 transition-colors self-end sm:self-center">
                        ביטול
                    </button>
                `;
                listContainer.appendChild(item);
            });
        }

        async function deleteBooking(id) {
            if(confirm('האם אתה בטוח שברצונך לבטל את השריון המבוקש?')) {
                bookings = bookings.filter(b => b.id !== id);
                
                // שמירה לשרת לאחר מחיקת השריון
                await saveToServer(bookings);
                
                renderCalendar();
                renderDayBookings(selectedDateStr);
            }
        }
    </script>
</body>
</html>
