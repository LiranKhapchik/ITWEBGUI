<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>העמוד בבנייה - צוות תשתיות ורשת</title>
<link rel="stylesheet" href="css/style.css">
    <script src="js/tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="js/config.js"></script>
<script src="js/common.js"></script>

<style>
html { font-size: 18px; }

body { 
    font-family: 'Assistant', 'Segoe UI', Tahoma, sans-serif; 
    background-color: #fafbfc; 
    letter-spacing: -0.01em; 
    color: #111827;
}

h1, h2, h3, .font-extrabold {
    font-weight: 800 !important;
    letter-spacing: -0.025em;
    text-shadow: 0 0.5px 0 rgba(0,0,0,0.1); 
}

/* אנימציה איטית לגלגל שיניים */
@keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.animate-spin-slow {
    animation: spin-slow 8s linear infinite;
}
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="flex justify-between items-center mb-6 px-4 pt-6 max-w-4xl mx-auto w-full">
    <div class="flex items-center gap-4">
        <a href="אתר מחשוב.html" class="px-4 py-2.5 rounded-xl bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 font-extrabold text-sm transition-all flex items-center gap-2 shadow-sm" title="חזרה לאתר מחשוב">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
            <span>לאתר מחשוב</span>
        </a>
        <div>
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-gray-900">עמוד בבניה</h1>
            <p class="text-[#3776AB] font-semibold mt-1 text-base">צוות מחשוב</p>
        </div>
    </div>
    <div class="flex items-center gap-3">
        <button onclick="toggleDarkMode()" class="flex items-center justify-center p-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-gray-700 transition-all border border-gray-200" title="מצב חשוך">
            <ui-icon name="moon" class="w-5 h-5"></ui-icon>
        </button>
    </div>
</header>

<main class="w-full max-w-2xl mx-auto px-4 pb-12 flex flex-col items-center justify-center flex-1">
  <div class="w-full bg-white rounded-[2rem] shadow-[0_10px_40px_-10px_rgba(0,0,0,0.08)] border border-gray-100 overflow-hidden relative">
    
    <div class="absolute -top-32 -right-32 w-64 h-64 bg-[#3776AB]/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-32 -left-32 w-64 h-64 bg-[#3776AB]/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="px-6 py-16 sm:py-24 text-center relative z-10">
      
      <div class="w-24 h-24 bg-[#f0f9ff] border-[4px] border-white shadow-lg rounded-full flex items-center justify-center mx-auto mb-8 relative">
        <div class="absolute inset-0 rounded-full border border-[#bae6fd]"></div>
        
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-[#3776AB] animate-spin-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z"></path>
          <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path>
        </svg>

        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-700 absolute bottom-4 right-3 bg-white rounded-full p-0.5 shadow-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77 -3.77a6 6 0 0 1 -7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1 -3 -3l6.91 -6.91a6 6 0 0 1 7.94 -7.94l-3.76 3.76z"></path>
        </svg>
      </div>

      <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-3">העמוד בבנייה</h2>
      <p class="text-gray-500 font-medium text-lg mb-10 max-w-sm mx-auto leading-relaxed">
        אנו מפתחים כרגע את החלק הזה במערכת כדי לשפר את חווית השירות. <br>
        העמוד יהיה זמין בהקדם!
      </p>
        <a href="אתר מחשוב.html" class="inline-flex items-center justify-center gap-2 bg-[#3776AB] text-white rounded-xl px-8 py-3.5 font-extrabold shadow-md shadow-[#3776AB]/20 hover:bg-[#2b5d87] transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0"></path><path d="M13 18l6 -6"></path><path d="M13 6l6 6"></path></svg>
          חזרה לאתר מחשוב
        </a>
    </div>
  </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', checkBrowserChrome);
</script>
</body>
</html>
